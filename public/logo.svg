  <!-- Water waves -->
  <path d="M2,76 Q17,70 32,76 Q47,82 62,76 Q77,70 98,76" stroke="#4A90D9" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M2,85 Q17,79 32,85 Q47,91 62,85 Q77,79 98,85" stroke="#4A90D9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
