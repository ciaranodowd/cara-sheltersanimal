<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ark cabin -->
  <rect x="22" y="28" width="56" height="26" rx="3" fill="#7C5C3E"/>
  <!-- Roof -->
  <polygon points="16,28 50,10 84,28" fill="#5C3D1E"/>
  <!-- Cabin window -->
  <rect x="40" y="35" width="20" height="13" rx="2" fill="#B8D4E8"/>
  <!-- Hull -->
  <path d="M8,54 L92,54 L84,72 Q50,82 16,72 Z" fill="#9B6B45"/>
  <!-- Hull plank line -->
